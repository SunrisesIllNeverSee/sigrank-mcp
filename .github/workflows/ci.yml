name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Secret scan — blocks commits that leak keys/tokens. Uses gitleaks; for a
  # public repo the default GITHUB_TOKEN is sufficient (no license key needed).
  # Especially important here: this repo holds ed25519 key generation + signing
  # code (keystore.mjs, sign.mjs) — a leaked private key would allow forged
  # signed submissions to the leaderboard.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action needs pull-requests: write to post review comments on
      # PRs. Without it the scan still runs and fails on leaks, but PR
      # annotations silently don't appear.
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan past commits, not just the diff.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .github/gitleaks.toml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests (29 assertions)
        run: node test.mjs

      - name: Signing tests
        run: node sign.test.mjs

      - name: TUI startup input regression
        run: node --test __tests__/tui-input.test.mjs

      - name: Version format check (3-digit ruleset)
        run: node scripts/check-version.mjs

  # Cross-repo contract test — catches platform-enum drift between the MCP server
  # and the web app. The codex landing was triple-blocked because these enums
  # drifted. This job checks out the web repo and diffs the two enums.
  cross-repo-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Checkout sigrank-app (the other half of the contract)
        uses: actions/checkout@v7
        with:
          repository: SunrisesIllNeverSee/sigrank-app
          path: _sigrank-app
          # Public repo — no token needed. If it goes private, add a PAT secret.
          # token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Cross-repo platform-enum contract test
        run: node __tests__/contract/platform-enum-contract.test.mjs ${{ github.workspace }}/_sigrank-app

  # Verify the published tarball doesn't leak test fixtures or sensitive files.
  # The files[] whitelist in package.json controls what ships; this job is
  # defense-in-depth in case the whitelist is ever accidentally widened.
  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Verify tarball contents (no test fixtures / secrets leak)
        run: |
          set -e
          TARBALL=$(npm pack --dry-run 2>&1)
          echo "$TARBALL"
          # Fail if any test fixture or .env file appears in the tarball
          if echo "$TARBALL" | grep -iE "test|fixture|\.env|canon_parity|\.key"; then
            echo "✗ FAIL: test fixture or sensitive file found in tarball"
            exit 1
          fi
          # Verify connect.mjs is present (the 0.11.5 hotfix)
          if ! echo "$TARBALL" | grep -q "connect.mjs"; then
            echo "✗ FAIL: connect.mjs missing from tarball (0.11.5 regression)"
            exit 1
          fi
          echo "✓ Tarball is clean"

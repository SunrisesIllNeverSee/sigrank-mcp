name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          release-type: node
          package-name: sigrank
          # 3-digit versioning: 0.0.NNN (see VERSIONING_RULESET.md).
          # bump-patch-only prevents minor/major bumps — every conventional
          # commit produces a patch bump only (0.0.177 → 0.0.178 → 0.0.179...).
          # Merge the PR to cut a release. npm publish is still manual (owner
          # runs `npm publish` from inside the repo dir).
          include-component-in-tag: false
          bump-patch-only: true

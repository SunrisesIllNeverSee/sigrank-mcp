name: Bug Report
description: Report a bug in sigrank-mcp
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - CLI / TUI dashboard
        - MCP server (piped to AI client)
        - npx one-shot
        - Not sure
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform adapter
      description: Which platform were you using?
      placeholder: "claude, codex, amp, gemini, ..."
  - type: textarea
    id: output
    attributes:
      label: Console output
      description: Paste the error or unexpected output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: sigrank-mcp version
      placeholder: "0.11.2"
    validations:
      required: true

name: Feature Request
description: Suggest a feature for sigrank-mcp
title: "[FEATURE]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / TUI dashboard
        - MCP tools
        - Platform adapter (new or existing)
        - Cascade math
        - Other
